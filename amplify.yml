version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd pressplay-app && npm ci
    build:
      commands:
        - cd pressplay-app && npm run build
  artifacts:
    baseDirectory: pressplay-app/dist
    files:
      - '**/*'
  cache:
    paths:
      - pressplay-app/node_modules/**/*
