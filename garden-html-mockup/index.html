<!doctype html>

<body>
  <main class="phone" aria-label="PressPlay 花園頁面視覺稿">

      <div class="ai-companion" role="img" aria-label="AI 農夫夥伴揮手提醒你">
        <span class="companion-alert" aria-hidden="true">[!]</span>
        <svg class="companion-character" viewBox="0 0 136 162" aria-hidden="true">
          <defs>
            <linearGradient id="farmer-hat" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#f9d574"/>
              <stop offset="1" stop-color="#d99f35"/>
            </linearGradient>
            <linearGradient id="farmer-overalls" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#77baf2"/>
              <stop offset="1" stop-color="#397fbe"/>
            </linearGradient>
            <filter id="farmer-shadow" x="-30%" y="-30%" width="160%" height="180%">
              <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#326b3b" flood-opacity=".28"/>
            </filter>
          </defs>

          <ellipse cx="65" cy="153" rx="39" ry="7" fill="#326b3b" opacity=".22"/>

              <path d="M39 101Q25 109 22 124" fill="none" stroke="#f2b78f" stroke-width="13" stroke-linecap="round"/>

            <ellipse cx="62" cy="50" rx="40" ry="8.5" fill="#d79c33"/>

    <section class="reminder-area" aria-label="澆水提醒">
      <div class="reminder-card">
        <span class="water-drop" aria-hidden="true"></span>
        <div class="reminder-copy">
          <strong>3 朵花需要澆水</strong>
          <span>點擊開始今日複習</span>
        </div>
        <span class="review-pill">複習</span>
      </div>

    <nav class="bottom-nav" aria-label="主選單">
